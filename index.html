<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Gym Tracker</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

    <header>
        <h1>🏋️ Gym Tracker</h1>
        <p class="subtitle">
            Welcome James 👋
        </p>
    </header>


    <main>

    <button class="primary" id="startWorkout">
    ▶ Start Workout
</button>

<button id="manageWorkout">
    ✏️ Manage Workout
</button>

<button id="history">
    📜 Workout History
</button>

        <button id="progress">
            📈 Progress
        </button>

        <button id="settings">
            ⚙ Settings
        </button>


        <section class="last-workout">

            <h2>Last Workout</h2>

            <p>
                No workouts recorded yet
            </p>

        </section>


    </main>


    <footer>

        Gym Tracker - Sprint 2

    </footer>


</div>


<script src="data/defaultWorkout.js"></script>
<script src="js/storage.js"></script>
<script src="js/components.js"></script>
<script src="js/manageWorkout.js"></script>
<script src="js/app.js"></script>

</body>

</html>
